# =============================================
# Nginx 反向代理 — 可选手工覆盖 deploy.sh 生成的配置
# 默认路径：/etc/nginx/sites-available/release-hub
#
# 默认以子路径 /release-hub/ 反代，与其他站点共用 80 端口。
# 若有域名，可将 server_name 改为域名，并配合 certbot 启用 HTTPS。
# deploy.sh 交互部署时默认前缀也是 release-hub。
# =============================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # 有域名时改为：server_name releases.example.com;
    server_name _;

    client_max_body_size 500M;
    client_body_timeout 300s;

    # 默认：子路径反代（访问 http://<IP>/release-hub/）
    # deploy.sh 自动生成的内容与下方一致；可手动改前缀或换成 location /
    location /release-hub/ {
        proxy_pass http://127.0.0.1:3721/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 若需占用整站根路径，改为：
    # location / {
    #     proxy_pass http://127.0.0.1:3721;
    #     ...
    # }
}

# HTTPS（certbot 执行后通常会在此文件追加 ssl 相关块）
# sudo certbot --nginx -d your-domain.com
# 然后在管理后台将 BASE_URL 改为 https://your-domain.com/release-hub