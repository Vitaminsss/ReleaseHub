# =============================================
# Nginx 反向代理 — 可选手工覆盖 deploy.sh 生成的配置
# 默认路径：/etc/nginx/sites-available/release-hub
#
# deploy.sh 默认 NGINX_PREFIX=releasehub → 对外路径为 /releasehub/（非整站根）。
# 仅当部署时显式 NGINX_PREFIX= 空字符串时，才使用「整站根」location /。
# 无 default_server。若与 HomePortal 同域名：设 UNIFIED_NGINX=1，由 /etc/nginx/snippets/unified.d/*.conf 与本仓库片段共同维护。
# =============================================

server {
    listen 80;
    listen [::]:80;
    server_name releaseshub.local;

    client_max_body_size 100M;
    client_body_timeout 300s;

    # 默认与 deploy.sh 一致：子路径反代（注意末尾 / 与 proxy_pass 末尾 /）
    # 必须写在可匹配上传的 location 内，避免只出现在 server 时仍被其它 include 的默认值限制为 1m
    location /releasehub/ {
        client_max_body_size 100M;
        client_body_timeout 300s;
        proxy_pass http://localhost:3721/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 若部署时 NGINX_PREFIX= 置空（整站根 /），改用下面块并删除或注释上一段 location /releasehub/
    # location / {
    #     proxy_pass http://localhost:3721;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 300s;
    #     proxy_send_timeout 300s;
    # }
}

