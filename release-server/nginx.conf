# =============================================
# Nginx 反向代理 — 可选手工覆盖 deploy.sh 生成的配置
# 默认路径：/etc/nginx/sites-available/release-hub
#
# deploy.sh 会写入同路径的简化版（HTTP 80 → 127.0.0.1:3721）。
# 若你有域名，可将 server_name 改为域名，并配合 certbot 启用 HTTPS。
# =============================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # 有域名时改为：server_name releases.example.com;
    server_name _;

    client_max_body_size 500M;
    client_body_timeout 300s;

    # 若需与其它站点共用 80 端口，可改为子路径反代（与 deploy.sh 询问的「路径前缀」一致），例如：
    # location /release-hub/ {
    #     proxy_pass http://127.0.0.1:3721/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 300s;
    #     proxy_send_timeout 300s;
    # }

    location / {
        proxy_pass http://127.0.0.1:3721;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# ─────────────────────────────────────────────
# HTTPS：certbot 成功后，同一站点文件内通常会呈现类似结构
# （证书路径以 /etc/letsencrypt/live/<域名>/ 为准，由 certbot 自动写入）
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name releases.example.com;
#
#     ssl_certificate     /etc/letsencrypt/live/releases.example.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/releases.example.com/privkey.pem;
#     include /etc/letsencrypt/options-ssl-nginx.conf;
#     ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
#
#     client_max_body_size 500M;
#     client_body_timeout 300s;
#
#     location / {
#         proxy_pass http://127.0.0.1:3721;
#         proxy_http_version 1.1;
#         proxy_set_header Upgrade $http_upgrade;
#         proxy_set_header Connection "upgrade";
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#         proxy_read_timeout 300s;
#         proxy_send_timeout 300s;
#     }
# }
#
# HTTP 会由 certbot 改为仅做 301 跳转到 HTTPS，例如：
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name releases.example.com;
#     return 301 https://$host$request_uri;
# }
#
# 一键申请（在 server_name 已设为域名、DNS 已生效后）：
#   sudo certbot --nginx -d releases.example.com
# 然后在管理后台将 BASE_URL 设为 https://releases.example.com
# ─────────────────────────────────────────────
