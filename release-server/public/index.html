<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Release Hub</title>
<style>
:root {
  --bg: #0c0b09; --bg1: #12100e; --bg2: #1a1714; --bg3: #221f1b;
  --border: #2c2820; --border2: #3d3529;
  --accent: #e8a035; --accent-dim: #c98728;
  --accent-glow: rgba(232,160,53,0.18); --accent-glow2: rgba(232,160,53,0.09);
  --red: #e85d4c; --red-dim: rgba(232,93,76,0.15);
  --blue: #6eb5ff; --green: #52d48a; --purple: #a78bfa;
  --text: #ebe6df; --text2: #9a9288; --text3: #6b6459;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;font-size:15px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,160,53,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,160,53,.03) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0}
#app{position:relative;z-index:1}

/* LOGIN */
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{width:100%;max-width:380px;border:1px solid var(--border2);background:linear-gradient(165deg,var(--bg1) 0%,var(--bg2) 100%);padding:44px 40px;position:relative;box-shadow:0 24px 48px rgba(0,0,0,.35)}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),#d4a574,transparent)}
.login-logo{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.35em;text-transform:uppercase;margin-bottom:10px}
.login-title{font-size:26px;font-weight:800;color:var(--text);margin-bottom:28px;line-height:1.15}
.login-title span{color:var(--accent)}
@keyframes loginIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-box .field{animation:loginIn .6s cubic-bezier(.22,1,.36,1) .12s both}
.login-box .btn-primary{animation:loginIn .6s cubic-bezier(.22,1,.36,1) .22s both}

/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;letter-spacing:2px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}
input[type=text],input[type=password],input[type=url],textarea,select{width:100%;background:var(--bg);border:1px solid var(--border2);color:var(--text);font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow2)}
textarea{resize:vertical;min-height:72px}
select option{background:var(--bg2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;font-weight:600;letter-spacing:.5px;border:none;cursor:pointer;transition:all .15s;text-transform:uppercase;white-space:nowrap}
.btn-primary{background:linear-gradient(180deg,#f0b24a 0%,var(--accent) 100%);color:#1a1208}
.btn-primary:hover{filter:brightness(1.07);box-shadow:0 0 24px var(--accent-glow)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(232,93,76,.35)}
.btn-danger:hover{background:var(--red-dim)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-full{width:100%;justify-content:center}

/* LAYOUT */
#main-page{display:none;min-height:100vh}
.topbar{height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;background:linear-gradient(180deg,var(--bg1) 0%,rgba(18,16,14,.97) 100%);position:sticky;top:0;z-index:100;box-shadow:0 6px 24px rgba(0,0,0,.2)}
.topbar-logo{font-size:15px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px}
.topbar-logo::before{content:'◆';font-size:12px;opacity:.9}
.topbar-sep{flex:1}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.topbar-url{font-size:11px;color:var(--text3);font-family:monospace;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.layout{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 52px)}

/* SIDEBAR */
.sidebar{border-right:1px solid var(--border);background:var(--bg1);padding:14px 0;overflow-y:auto}
.sidebar-label{font-size:9px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;padding:8px 14px 5px}
.app-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;border:1px solid transparent;margin:0 6px 2px;border-radius:2px;transition:all .15s}
.app-item:hover{background:var(--bg2);border-color:var(--border)}
.app-item.active{background:var(--accent-glow2);border-color:var(--accent)}
.app-icon{width:26px;height:26px;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);flex-shrink:0;font-weight:700}
.active .app-icon{border-color:var(--accent);color:var(--accent)}
.app-info{flex:1;min-width:0}
.app-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-meta{font-size:10px;color:var(--text3);margin-top:1px;display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.active .app-meta{color:var(--accent-dim)}
.type-pill{display:inline-flex;align-items:center;font-size:9px;letter-spacing:.6px;padding:1px 5px;border:1px solid;border-radius:2px;text-transform:uppercase;flex-shrink:0}
.type-general{color:var(--green);border-color:rgba(82,212,138,.4);background:rgba(82,212,138,.07)}
.type-tauri{color:var(--purple);border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.07)}

/* CONTENT */
.content{padding:22px;overflow-y:auto}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;color:var(--text3)}
.empty-icon{font-size:42px;margin-bottom:14px;opacity:.25}
.empty-text{font-size:13px;line-height:1.6}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.page-title span{color:var(--accent)}
.page-sub{font-size:12px;color:var(--text3);margin-top:3px}

/* API CARD - left/right split（左：检查更新接口优先占宽；右：当前 JSON 次之） */
.api-card{border:1px solid var(--border2);background:var(--bg1);margin-bottom:20px;position:relative;overflow:hidden}
.api-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--green),var(--purple))}
.api-card-inner{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(0,0.75fr);gap:0;align-items:start}
.api-left{padding:16px 18px;border-right:1px solid var(--border);min-width:0}
.api-right{padding:16px 18px;background:var(--bg);min-width:0;max-width:100%}
.api-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:12px}
.api-row{display:flex;align-items:stretch;border:1px solid var(--border2);overflow:hidden;margin-bottom:8px;min-width:0}
.api-method{background:var(--bg3);padding:0 10px;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);display:flex;align-items:center;border-right:1px solid var(--border2);flex-shrink:0}
.api-url{flex:1;padding:8px 10px;background:var(--bg);font-size:12px;color:var(--blue);font-family:monospace;word-break:break-all;line-height:1.4;display:flex;align-items:center}
.api-copy{background:var(--bg3);border:none;border-left:1px solid var(--border2);color:var(--text3);cursor:pointer;padding:0 12px;font-size:11px;font-weight:600;letter-spacing:.5px;transition:all .15s;flex-shrink:0;text-transform:uppercase}
.api-copy:hover{background:var(--accent-glow);color:var(--accent)}
.api-hint{font-size:11px;color:var(--text3);line-height:1.6;margin-top:6px;padding:8px;background:rgba(255,255,255,.02);border:1px solid var(--border)}
.api-json-label{font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.api-json-box{background:var(--bg1);border:1px solid var(--border);padding:10px;font-size:11px;font-family:monospace;color:var(--accent-dim);overflow-x:auto;white-space:pre;max-height:200px;overflow-y:auto;line-height:1.55}
.api-json-empty{font-size:12px;color:var(--text3);padding:20px;text-align:center;border:1px dashed var(--border);font-style:italic}

/* TAURI API CARD */
.tauri-api-card{border:1px solid var(--border2);background:var(--bg1);margin-bottom:20px;position:relative;overflow:hidden}
.tauri-api-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--accent))}
.tauri-api-inner{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(0,0.75fr);gap:0;align-items:start}
.tauri-left{padding:16px 18px;border-right:1px solid var(--border);min-width:0}
.tauri-right{padding:16px 18px;background:var(--bg);min-width:0;max-width:100%}
.tauri-section-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--purple);margin-bottom:12px}
.tauri-config-json{background:var(--bg);border:1px solid var(--border);padding:10px;font-size:11px;font-family:monospace;color:var(--accent-dim);overflow-x:auto;white-space:pre;line-height:1.55;margin-top:8px}

/* VERSION GRID */
.version-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-bottom:12px}

/* VERSION CARD - sketch layout: title bar / icon+name / desc */
.vcard{border:1px solid var(--border);background:var(--bg1);transition:border-color .2s,box-shadow .2s,transform .2s;display:flex;flex-direction:column}
.vcard:hover{border-color:var(--border2);box-shadow:0 8px 28px rgba(0,0,0,.22);transform:translateY(-1px)}
.vcard.is-latest{border-color:var(--accent);box-shadow:0 0 0 1px rgba(232,160,53,.12)}

/* Title bar */
.vcard-titlebar{display:flex;align-items:center;padding:10px 14px;gap:8px;background:var(--bg2);border-bottom:1px solid var(--border)}
.vcard-ver{font-size:15px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.vcard-badges{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.badge{font-size:9px;letter-spacing:1px;padding:2px 6px;border:1px solid;text-transform:uppercase}
.badge-latest{color:var(--accent);border-color:var(--accent);background:var(--accent-glow2)}
.badge-draft{color:var(--text3);border-color:var(--border2)}
.badge-win{color:#7ecbff;border-color:rgba(126,203,255,.45);background:rgba(126,203,255,.08)}
.badge-linux{color:#f7c948;border-color:rgba(247,201,72,.45);background:rgba(247,201,72,.08)}
.badge-mac{color:#a78bfa;border-color:rgba(167,139,250,.45);background:rgba(167,139,250,.08)}
.badge-sig{color:var(--green);border-color:rgba(82,212,138,.4)}
.badge-file{color:var(--text3);border-color:var(--border2)}

/* Icon + file count row */
.vcard-info{display:flex;align-items:center;padding:10px 14px;gap:10px;border-bottom:1px solid var(--border)}
.vcard-filecount{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.vcard-fc-icon{font-size:16px;opacity:.6;flex-shrink:0}
.vcard-fc-num{font-size:12px;font-weight:500;color:var(--text);line-height:1.45}
.vcard-set-latest-btn{margin-left:auto}

/* Notes / desc row */
.vcard-notes{padding:8px 14px;font-size:12px;color:var(--text3);line-height:1.5;border-bottom:1px solid var(--border);min-height:36px}
.vcard-notes.empty{font-style:italic;opacity:.5}

/* Expand toggle */
.vcard-toggle{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;cursor:pointer;font-size:11px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase;user-select:none;transition:background .15s}
.vcard-toggle:hover{background:var(--bg2);color:var(--text2)}
.vcard-toggle-arrow{transition:transform .2s}
.vcard-body{display:none;border-top:1px solid var(--border)}
.vcard-body.open{display:block}
.vcard-body-inner{padding:12px 14px}

/* File table compact */
.file-table{width:100%;border-collapse:collapse;margin-bottom:10px}
.file-table th{text-align:left;font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;padding:6px 6px 4px;border-bottom:1px solid var(--border)}
.file-table td{padding:6px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
.file-table tr:last-child td{border-bottom:none}
.file-name{color:var(--text);font-weight:500;font-size:12px}
.file-sig{color:var(--green);font-size:11px}
.file-size{color:var(--text3);font-size:11px}
.file-actions{display:flex;gap:4px;justify-content:flex-end}

/* Upload zone */
.upload-zone{border:1px dashed var(--border2);min-height:120px;padding:28px 16px;display:flex;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--accent-glow2)}
.upload-zone-text{font-size:14px;color:var(--text2);line-height:1.5;max-width:280px}
.upload-zone-text strong{color:var(--accent)}

/* Notes textarea in card */
.notes-row{margin-bottom:10px}
.notes-label{font-size:10px;letter-spacing:1.5px;color:var(--text3);text-transform:uppercase;margin-bottom:5px}

/* Progress */
.progress-bar{height:2px;background:var(--border);margin:6px 0}
.progress-fill{height:100%;background:var(--accent);transition:width .3s;box-shadow:0 0 8px var(--accent)}

/* Tauri force-publish */
.force-row{display:flex;align-items:flex-start;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:10px;line-height:1.5}
.force-row input{width:auto;margin-top:2px;flex-shrink:0}

/* TOAST */
.toast-wrap{position:fixed;top:58px;right:18px;z-index:1000;display:flex;flex-direction:column;gap:7px}
.toast{padding:11px 14px;border:1px solid;font-size:12px;max-width:300px;animation:slideIn .2s ease;display:flex;align-items:center;gap:7px;background:var(--bg1)}
.toast-success{border-color:var(--accent);color:var(--accent)}
.toast-error{border-color:var(--red);color:var(--red)}
.toast-info{border-color:var(--blue);color:var(--blue)}
@keyframes slideIn{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);padding:26px;width:100%;max-width:460px;position:relative;animation:fadeUp .2s ease}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.modal-title{font-size:14px;font-weight:700;margin-bottom:18px;color:var(--text)}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
@keyframes fadeUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* TYPE SELECTOR */
.type-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-option{border:1px solid var(--border2);padding:14px 12px;cursor:pointer;transition:all .15s;text-align:center;background:var(--bg)}
.type-option:hover{border-color:var(--accent-dim);background:var(--bg2)}
.type-option.selected{border-color:var(--accent);background:var(--accent-glow2)}
.type-icon{font-size:20px;margin-bottom:5px}
.type-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
.type-desc{font-size:11px;color:var(--text3);line-height:1.4}
.type-option.selected .type-name{color:var(--accent)}

/* SETTINGS */
.settings-section{border:1px solid var(--border);background:var(--bg1);padding:18px;margin-bottom:14px}
.settings-title{font-size:10px;letter-spacing:2.5px;color:var(--text3);text-transform:uppercase;margin-bottom:14px}

.hidden{display:none!important}
@media(max-width:700px){.layout{grid-template-columns:1fr}.sidebar{display:none}.api-card-inner,.tauri-api-inner,.version-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">Release Hub</div>
    <div class="login-title">管理<span>控制台</span></div>
    <div class="field">
      <label>管理员密码</label>
      <input type="password" id="login-pwd" placeholder="输入密码" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-full" onclick="login()" id="login-btn">登录</button>
    <div id="login-err" style="color:var(--red);font-size:11px;margin-top:10px;display:none"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-page">
  <div class="topbar">
    <div class="topbar-logo">Release Hub</div>
    <span class="topbar-url" id="topbar-url"></span>
    <div class="topbar-sep"></div>
    <div class="status-dot"></div>
    <button class="btn btn-ghost btn-sm" onclick="showSettings()">设置</button>
    <button class="btn btn-ghost btn-sm" onclick="logout()">退出</button>
  </div>
  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-label">资源库</div>
      <div id="app-list"></div>
      <div style="padding:0 6px;margin-top:8px">
        <button class="btn btn-ghost btn-sm btn-full" onclick="showNewAppModal()">＋ 新建资源库</button>
      </div>
    </div>
    <div class="content" id="content">
      <div class="empty-state">
        <div class="empty-icon">◈</div>
        <div class="empty-text">从左侧选择资源库<br>或新建一个开始管理</div>
      </div>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toasts"></div>

<!-- NEW APP -->
<div class="modal-overlay" id="modal-new-app">
  <div class="modal" style="max-width:500px">
    <div class="modal-title">新建资源库</div>
    <div class="field">
      <label>库标识符</label>
      <input type="text" id="new-app-name" placeholder="my-app（字母、数字、连字符、下划线）">
    </div>
    <div class="field">
      <label>库类型</label>
      <div class="type-selector">
        <div class="type-option selected" id="type-opt-general" onclick="selectRepoType('general')">
          <div class="type-icon">📦</div>
          <div class="type-name">通用资源库</div>
          <div class="type-desc">适用于任意资源版本管理，标准 JSON 接口检查更新</div>
        </div>
        <div class="type-option" id="type-opt-tauri" onclick="selectRepoType('tauri')">
          <div class="type-icon">⚡</div>
          <div class="type-name">Tauri 专用库</div>
          <div class="type-desc">Tauri 热更新专用，自动生成含 .sig 签名的 latest.json</div>
        </div>
      </div>
      <input type="hidden" id="new-repo-type" value="general">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-app')">取消</button>
      <button class="btn btn-primary" onclick="createApp()">创建</button>
    </div>
  </div>
</div>

<!-- NEW VERSION -->
<div class="modal-overlay" id="modal-new-ver">
  <div class="modal">
    <div class="modal-title">新建版本</div>
    <div class="field">
      <label>版本号（格式：v1.0.0）</label>
      <input type="text" id="new-ver-num" placeholder=".....">
    </div>
    <div id="ver-err" style="color:var(--red);font-size:11px;margin-bottom:8px;display:none"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-ver')">取消</button>
      <button class="btn btn-primary" onclick="createVersion()">创建</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="modal-overlay" id="modal-confirm">
  <div class="modal">
    <div class="modal-title" id="confirm-title">确认删除</div>
    <div style="color:var(--text2);font-size:13px;line-height:1.6" id="confirm-msg"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-confirm')">取消</button>
      <button class="btn btn-danger" id="confirm-ok">删除</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal" style="max-width:480px">
    <div class="modal-title">设置</div>
    <div class="settings-section">
      <div class="settings-title">对外访问地址 BASE_URL</div>
      <p style="color:var(--text3);font-size:11px;margin-bottom:12px;line-height:1.6">文件下载直链和 latest.json 内的 URL 均依赖此地址，需与实际访问的域名/协议一致。</p>
      <div class="field">
        <label>BASE_URL</label>
        <input type="url" id="base-url-input" placeholder="https://releases.example.com">
      </div>
      <button class="btn btn-primary" onclick="saveBaseUrl()">保存</button>
    </div>
    <div class="settings-section">
      <div class="settings-title">修改管理员密码</div>
      <div class="field"><label>当前密码</label><input type="password" id="old-pwd" placeholder="当前密码" autocomplete="current-password"></div>
      <div class="field"><label>新密码（至少8位）</label><input type="password" id="new-pwd" placeholder="新密码" autocomplete="new-password"></div>
      <div class="field"><label>确认新密码</label><input type="password" id="new-pwd2" placeholder="再次输入" autocomplete="new-password"></div>
      <button class="btn btn-primary" onclick="changePassword()">更新密码</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-settings')">关闭</button>
    </div>
  </div>
</div>

<script>
// ── STATE ───────────────────────────────────────────
const S = {
  token: localStorage.getItem('rh_token'),
  apps: [], currentApp: null, currentRepoType: 'general',
  versions: [], pendingConfirm: null, notes: {},
};

// ── UTILS ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function basePath() {
  let p = (location.pathname || '/').replace(/\/index\.html$/i, '');
  return (!p || p === '/') ? '' : p.replace(/\/$/, '');
}
function apiUrl(p) { return p.startsWith('/') ? basePath() + p : p; }
function originWithBase() { const b = basePath(); return b ? location.origin + b : location.origin; }
function fmtBytes(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

function toast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${type==='success'?'✓':type==='error'?'✗':'ℹ'}</span> ${msg}`;
  $('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}
function openModal(id)  { $(id).classList.add('open'); }
function closeModal(id) { $(id).classList.remove('open'); }

function copyText(text) {
  const s = String(text);
  const fallback = () => {
    const ta = document.createElement('textarea');
    ta.value = s; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try {
      const ok = document.execCommand('copy');
      if (ok) toast('已复制'); else toast('复制失败', 'error');
    } catch { toast('复制失败', 'error'); }
    document.body.removeChild(ta);
  };
  try {
    const cp = navigator.clipboard;
    if (cp && typeof cp.writeText === 'function') {
      cp.writeText(s).then(() => toast('已复制')).catch(fallback);
    } else {
      fallback();
    }
  } catch {
    fallback();
  }
}

function fileBadge(name) {
  if (name.endsWith('.sig')) return { label:'SIG', cls:'badge-sig' };
  const f = name.toLowerCase();
  if (f.endsWith('.msi') || f.endsWith('.exe')) return { label:'WIN', cls:'badge-win' };
  if (f.endsWith('.appimage.tar.gz') || f.endsWith('.appimage')) return { label:'LINUX', cls:'badge-linux' };
  if (f.endsWith('.app.tar.gz') || f.endsWith('.dmg')) return { label:'MAC', cls:'badge-mac' };
  return { label:'FILE', cls:'badge-file' };
}

// Semver validation
function isValidVer(v) { return /^v\d+\.\d+(\.\d+)?(-[\w.]+)?$/.test(v); }

// ── API ─────────────────────────────────────────────
async function api(method, path, body, isUpload=false) {
  const opts = { method, headers: { Authorization: `Bearer ${S.token}` } };
  if (body && !isUpload) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  else if (body && isUpload) opts.body = body;
  const res = await fetch(apiUrl(path), opts);
  if (res.status === 401) { logout(); throw new Error('未授权'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '请求失败');
  return data;
}

// ── AUTH ────────────────────────────────────────────
async function login() {
  const pwd = $('login-pwd').value;
  if (!pwd) { showLoginErr('请输入密码'); return; }
  $('login-btn').disabled = true; $('login-btn').textContent = '验证中…';
  try {
    const res = await fetch(apiUrl('/api/login'), { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pwd}) });
    const data = await res.json().catch(()=>({}));
    if (!res.ok) throw new Error(data.error || '登录失败');
    S.token = data.token; localStorage.setItem('rh_token', data.token);
    enterMain();
  } catch(e) { showLoginErr(e.message); }
  $('login-btn').disabled = false; $('login-btn').textContent = '登录';
}
function showLoginErr(m) { $('login-err').textContent = m; $('login-err').style.display = 'block'; }
function logout() { S.token = null; localStorage.removeItem('rh_token'); $('login-page').style.display='flex'; $('main-page').style.display='none'; }
async function enterMain() {
  $('login-page').style.display='none'; $('main-page').style.display='block';
  $('topbar-url').textContent = originWithBase();
  $('login-err').style.display='none';
  await migrateLegacy();
  await loadApps();
}
window.onload = () => { if (S.token) enterMain().catch(()=>logout()); };

// ── LEGACY MIGRATION ────────────────────────────────
let legacyDone = false;
async function migrateLegacy() {
  if (legacyDone) return; legacyDone = true;
  try {
    const raw = localStorage.getItem('rh_notes_draft_v1');
    if (!raw) return;
    localStorage.removeItem('rh_notes_draft_v1');
    const obj = JSON.parse(raw);
    for (const [k, text] of Object.entries(obj||{})) {
      if (!text) continue;
      const idx = k.indexOf('::'); if (idx<=0) continue;
      try { await api('PUT', `/api/apps/${k.slice(0,idx)}/versions/${encodeURIComponent(k.slice(idx+2))}/notes`, {text}); } catch {}
    }
  } catch {}
}

// ── NOTES ───────────────────────────────────────────
const noteTimers = {};
function scheduleNote(app, ver, text) {
  const k = `${app}::${ver}`; S.notes[k] = text;
  clearTimeout(noteTimers[k]);
  noteTimers[k] = setTimeout(async () => {
    try { await api('PUT', `/api/apps/${app}/versions/${encodeURIComponent(ver)}/notes`, {text}); } catch {}
  }, 500);
}
async function flushNote(app, ver) {
  const k = `${app}::${ver}`;
  const ta = $('notes-'+ver);
  const text = ta ? ta.value : (S.notes[k] ?? '');
  S.notes[k] = text;
  try { await api('PUT', `/api/apps/${app}/versions/${encodeURIComponent(ver)}/notes`, {text}); } catch {}
}

// ── REPO TYPE SELECTOR ──────────────────────────────
function selectRepoType(t) {
  $('new-repo-type').value = t;
  $('type-opt-general').classList.toggle('selected', t==='general');
  $('type-opt-tauri').classList.toggle('selected', t==='tauri');
}

// ── LOAD APPS ───────────────────────────────────────
async function loadApps() {
  try {
    S.apps = await api('GET', '/api/apps');
    renderSidebar();
    if (S.currentApp) {
      const a = S.apps.find(x=>x.name===S.currentApp);
      if (a) { S.currentRepoType = a.repoType||'general'; renderApp(S.currentApp); }
    }
  } catch(e) { toast(e.message,'error'); }
}

function renderSidebar() {
  const list = $('app-list');
  list.innerHTML = '';
  S.apps.forEach(app => {
    const el = document.createElement('div');
    el.className = 'app-item' + (S.currentApp===app.name?' active':'');
    el.innerHTML = `
      <div class="app-icon">${app.name[0].toUpperCase()}</div>
      <div class="app-info">
        <div class="app-name">${esc(app.name)}</div>
        <div class="app-meta">
          <span class="type-pill ${app.repoType==='tauri'?'type-tauri':'type-general'}">${app.repoType==='tauri'?'Tauri':'通用'}</span>
          <span>${app.latestVersion?'v'+app.latestVersion:'未发布'}</span>
        </div>
      </div>`;
    el.onclick = () => selectApp(app.name, app.repoType||'general');
    list.appendChild(el);
  });
}

function selectApp(name, repoType) {
  S.currentApp = name; S.currentRepoType = repoType||'general';
  renderSidebar(); renderApp(name);
}

// ── RENDER APP PAGE ─────────────────────────────────
async function renderApp(appName) {
  const appData = S.apps.find(a=>a.name===appName);
  const repoType = appData?.repoType || 'general';
  let versions = [];
  try { versions = await api('GET', `/api/apps/${appName}/versions`); S.versions = versions; } catch {}
  try {
    const nd = await api('GET', `/api/apps/${appName}/notes-drafts`);
    Object.entries(nd.drafts||{}).forEach(([ver,text]) => { S.notes[`${appName}::${ver}`] = text; });
  } catch {}

  const typePill = `<span class="type-pill ${repoType==='tauri'?'type-tauri':'type-general'}" style="font-size:10px;padding:2px 8px">${repoType==='tauri'?'⚡ Tauri':'📦 通用'}</span>`;
  const latVer = appData?.latestVersion ? 'v'+appData.latestVersion : '未发布';

  $('content').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">/<span>${esc(appName)}</span> ${typePill}</div>
        <div class="page-sub">${versions.length} 个版本 · 当前发布 ${latVer}</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-danger btn-sm" onclick="confirmDeleteApp('${appName}')">删除库</button>
        <button class="btn btn-primary btn-sm" onclick="showNewVerModal()">＋ 新建版本</button>
      </div>
    </div>

    ${repoType === 'tauri' ? renderTauriApiCard(appName, versions) : renderGeneralApiCard(appName, versions)}

    ${versions.length === 0
      ? `<div class="empty-state"><div class="empty-icon">↑</div><div class="empty-text">还没有版本，点击「新建版本」开始</div></div>`
      : `<div class="version-grid">${versions.map(v => renderVersionCard(appName, v, repoType)).join('')}</div>`
    }
  `;

  bindNotes(appName, versions);

  // Load live latest JSON for general api card
  if (repoType === 'general') loadLiveJson(appName);
}

// ── API CARDS ───────────────────────────────────────
function renderGeneralApiCard(appName, versions) {
  const origin = originWithBase();
  const checkUrl = `${origin}/api/public/${appName}/latest`;
  return `
    <div class="api-card">
      <div class="api-card-inner">
        <div class="api-left">
          <div class="api-section-title">检查更新接口</div>
          <div class="api-row">
            <span class="api-method">GET</span>
            <span class="api-url" id="check-url-${appName}">${esc(checkUrl)}</span>
            <button type="button" class="api-copy" onclick='copyText(${JSON.stringify(checkUrl)})'>复制</button>
          </div>
          <div class="api-hint">
            客户端请求此接口，获取 <code style="color:var(--accent)">version</code> 字段与本地版本比较；有更新时从 <code style="color:var(--accent)">files</code> 数组下载资源。
            <br>返回 <code style="color:var(--text2)">204</code> 表示尚未发布任何版本。
          </div>
        </div>
        <div class="api-right">
          <div class="api-json-label">当前发布的 latest.json</div>
          <div id="live-json-${appName}" class="api-json-empty">（加载中…）</div>
        </div>
      </div>
    </div>`;
}

function renderTauriApiCard(appName, versions) {
  const origin = originWithBase();
  const latestUrl = `${origin}/releases/${appName}/latest.json`;
  const tauriJson = JSON.stringify({
    plugins: { updater: { pubkey: '你的公钥内容', endpoints: [latestUrl] } }
  }, null, 2);
  return `
    <div class="tauri-api-card">
      <div class="tauri-api-inner">
        <div class="tauri-left">
          <div class="tauri-section-title">Tauri Updater 接口</div>
          <div class="api-row">
            <span class="api-method" style="color:var(--purple)">JSON</span>
            <span class="api-url">${esc(latestUrl)}</span>
            <button type="button" class="api-copy" onclick='copyText(${JSON.stringify(latestUrl)})'>复制</button>
          </div>
          <div class="api-hint" style="margin-top:10px">
            将上方地址填入 <code style="color:var(--accent)">tauri.conf.json</code>：
          </div>
          <div class="tauri-config-json">${esc(tauriJson)}</div>
          <button class="btn btn-ghost btn-sm" onclick="copyText(${JSON.stringify(tauriJson)})">复制配置</button>
        </div>
        <div class="tauri-right">
          <div class="api-json-label">当前发布的 latest.json</div>
          <div id="live-json-${appName}" class="api-json-empty">（加载中…）</div>
        </div>
      </div>
    </div>`;
}

async function loadLiveJson(appName) {
  const el = $(`live-json-${appName}`);
  if (!el) return;
  try {
    const data = await api('GET', `/api/apps/${appName}/latest`);
    el.className = 'api-json-box';
    el.textContent = JSON.stringify(data, null, 2);
  } catch {
    el.className = 'api-json-empty';
    el.textContent = '尚未发布任何版本';
  }
}

// ── VERSION CARD ─────────────────────────────────────
function renderVersionCard(appName, v, repoType) {
  const files = (v.files||[]).filter(f=>f.name!=='.gitkeep');
  const mainFiles = files.filter(f=>!f.name.endsWith('.sig'));
  const sigCount = files.filter(f=>f.name.endsWith('.sig')).length;
  const fileCountLabel = files.length === 0
    ? '暂无文件'
    : `共 ${files.length} 个文件${sigCount ? `（含 ${sigCount} 个签名）` : ''}`;
  const notesKey = `${appName}::${v.version}`;
  const notes = S.notes[notesKey] || '';

  return `
    <div class="vcard ${v.isLatest?'is-latest':''}" id="vcard-${v.version}">
      <!-- Title bar -->
      <div class="vcard-titlebar">
        <span class="vcard-ver">${v.version}</span>
        <div class="vcard-badges">
          ${v.isLatest ? '<span class="badge badge-latest">LATEST</span>' : '<span class="badge badge-draft">草稿</span>'}
          ${mainFiles.map(f=>{ const b=fileBadge(f.name); return `<span class="badge ${b.cls}">${b.label}</span>`; }).join('')}
        </div>
      </div>
      <!-- File count + Set Latest button -->
      <div class="vcard-info">
        <div class="vcard-filecount">
          <span class="vcard-fc-icon">📄</span>
          <span class="vcard-fc-num">${esc(fileCountLabel)}</span>
        </div>
        ${!v.isLatest
          ? `<button class="btn btn-primary btn-sm vcard-set-latest-btn" onclick="quickPublish('${appName}','${v.version}','${repoType}')">▶ 设为最新发布</button>`
          : `<button class="btn btn-ghost btn-sm vcard-set-latest-btn" onclick="publishVersion('${appName}','${v.version}','${repoType}')">↻ 重新发布</button>`
        }
      </div>
      <!-- Notes row -->
      <div class="vcard-notes ${!notes?'empty':''}">${notes ? esc(notes) : '暂无版本说明'}</div>
      <!-- Expand toggle -->
      <div class="vcard-toggle" onclick="toggleCard('${v.version}')">
        <span>文件 &amp; 发布设置</span>
        <span class="vcard-toggle-arrow" id="arrow-${v.version}" style="transform:rotate(180deg)">▾</span>
      </div>
      <!-- Body -->
      <div class="vcard-body open" id="vbody-${v.version}">
        <div class="vcard-body-inner">
          ${files.length > 0 ? renderFileTable(appName, v, files) : ''}
          <!-- Upload -->
          <div class="upload-zone" id="upload-${v.version}"
            onclick="event.stopPropagation();$('fi-${v.version}').click()"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="event.preventDefault();this.classList.remove('drag-over');handleDrop(event,'${appName}','${v.version}')">
            <div class="upload-zone-text">↑ 拖拽文件或 <strong>点击上传</strong>${repoType==='tauri'?' · 含 .sig':''}</div>
          </div>
          <input type="file" id="fi-${v.version}" style="display:none" multiple onchange="uploadFiles('${appName}','${v.version}',this.files)">
          <div id="uprog-${v.version}" class="hidden">
            <div style="font-size:12px;color:var(--text3);margin-top:6px">上传中...</div>
            <div class="progress-bar"><div class="progress-fill" id="pfill-${v.version}" style="width:0%"></div></div>
          </div>
          <!-- Notes textarea -->
          <div class="notes-row" style="margin-top:10px">
            <div class="notes-label">版本说明</div>
            <textarea id="notes-${v.version}" rows="2" placeholder="描述本版本更新内容…"></textarea>
          </div>
          ${repoType==='tauri' ? `
          <label class="force-row">
            <input type="checkbox" id="force-${v.version}">
            <span>强制发布（无 .sig 时仍可发布；Tauri 热更新需有效签名）</span>
          </label>` : ''}
          <!-- Save / delete -->
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px">
            <button class="btn btn-primary btn-sm" onclick="saveVersionDraft('${appName}','${v.version}')">保存</button>
            <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="confirmDeleteVersion('${appName}','${v.version}')">删除版本</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderFileTable(appName, v, files) {
  return `
    <table class="file-table">
      <thead><tr><th>文件名</th><th>大小</th><th>类型</th><th></th></tr></thead>
      <tbody>
        ${files.map(f => {
          const b = fileBadge(f.name);
          const en = f.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
          return `<tr>
            <td><span class="${f.name.endsWith('.sig')?'file-sig':'file-name'}">${esc(f.name)}</span></td>
            <td><span class="file-size">${fmtBytes(f.size)}</span></td>
            <td><span class="badge ${b.cls}">${b.label}</span></td>
            <td><div class="file-actions">
              <button type="button" class="btn btn-ghost btn-sm" onclick='copyText(${JSON.stringify(f.url)})'>⎘</button>
              <a href="${esc(f.url)}" target="_blank" class="btn btn-ghost btn-sm">↓</a>
              <button class="btn btn-danger btn-sm" onclick="deleteFile('${appName}','${v.version}','${en}')">✕</button>
            </div></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

function toggleCard(ver) {
  const body = $(`vbody-${ver}`);
  const arrow = $(`arrow-${ver}`);
  const open = body.classList.toggle('open');
  if (arrow) arrow.style.transform = open ? 'rotate(180deg)' : '';
}

// ── NOTES BINDING ────────────────────────────────────
function bindNotes(appName, versions) {
  const content = $('content');
  content.oninput = function(e) {
    if (e.target.tagName!=='TEXTAREA' || !e.target.id.startsWith('notes-')) return;
    const ver = e.target.id.slice(6);
    scheduleNote(appName, ver, e.target.value);
    // update the notes preview in card header
    const notesDiv = document.querySelector(`#vcard-${ver} .vcard-notes`);
    if (notesDiv) {
      notesDiv.textContent = e.target.value || '暂无版本说明';
      notesDiv.className = 'vcard-notes' + (e.target.value ? '' : ' empty');
    }
  };
  versions.forEach(v => {
    const ta = $('notes-'+v.version);
    if (!ta) return;
    const k = `${appName}::${v.version}`;
    if (S.notes[k] !== undefined) ta.value = S.notes[k];
  });
}

// ── UPLOAD ───────────────────────────────────────────
async function handleDrop(e, app, ver) {
  await uploadFiles(app, ver, e.dataTransfer.files);
}
async function uploadFiles(app, ver, files) {
  if (!files || !files.length) return;
  const prog = $(`uprog-${ver}`), fill = $(`pfill-${ver}`);
  prog.classList.remove('hidden'); fill.style.width='0%';
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  let p = 0;
  const iv = setInterval(() => { p = Math.min(p+5, 85); fill.style.width=p+'%'; }, 100);
  try {
    await api('POST', `/api/apps/${app}/versions/${ver}/upload`, fd, true);
    clearInterval(iv); fill.style.width='100%';
    toast(`${files.length} 个文件上传成功`);
    setTimeout(() => prog.classList.add('hidden'), 900);
    await renderApp(app);
  } catch(e) { clearInterval(iv); prog.classList.add('hidden'); toast(e.message,'error'); }
}

async function saveVersionDraft(app, ver) {
  try {
    await flushNote(app, ver);
    toast('版本说明已保存');
  } catch(e) { toast(e.message,'error'); }
}

// ── PUBLISH ──────────────────────────────────────────
async function quickPublish(app, ver, repoType) {
  // Publish using current state with no prompt - just set as latest
  try {
    await flushNote(app, ver);
    const preview = await api('GET', `/api/apps/${app}/versions/${ver}/preview-release`);
    const k = `${app}::${ver}`; preview.notes = S.notes[k] ?? '';
    if (repoType === 'tauri') {
      const miss = Object.entries(preview.platforms||{}).filter(([,p])=>p.signature?.includes('未找到'));
      if (miss.length > 0) { toast(`缺少 .sig: ${miss.map(([k])=>k).join(', ')}，请在版本内勾选强制发布`, 'error'); return; }
    }
    await api('POST', `/api/apps/${app}/publish`, preview);
    toast(`✓ ${ver} 已设为最新发布版本`);
    await loadApps();
  } catch(e) { toast(e.message,'error'); }
}

async function publishVersion(app, ver, repoType) {
  try {
    await flushNote(app, ver);
    const preview = await api('GET', `/api/apps/${app}/versions/${ver}/preview-release`);
    const k = `${app}::${ver}`; preview.notes = S.notes[k] ?? '';
    if (repoType === 'tauri') {
      const force = $(`force-${ver}`)?.checked;
      const miss = Object.entries(preview.platforms||{}).filter(([,p])=>p.signature?.includes('未找到'));
      if (!force && miss.length > 0) { toast(`缺少 .sig: ${miss.map(([k])=>k).join(', ')}`, 'error'); return; }
    }
    await api('POST', `/api/apps/${app}/publish`, preview);
    toast(`✓ ${ver} 已发布`);
    await loadApps();
    // Refresh live JSON
    if (S.currentRepoType !== 'tauri' || true) loadLiveJson(app);
  } catch(e) { toast(e.message,'error'); }
}

// ── DELETE ───────────────────────────────────────────
async function deleteFile(app, ver, name) {
  try { await api('DELETE', `/api/apps/${app}/versions/${ver}/files/${encodeURIComponent(name)}`); toast(`已删除 ${name}`); await renderApp(app); }
  catch(e) { toast(e.message,'error'); }
}
function confirmDeleteVersion(app, ver) {
  $('confirm-title').textContent = `删除版本 ${ver}`;
  $('confirm-msg').textContent = `将删除版本 ${ver} 的所有文件，不可恢复。`;
  S.pendingConfirm = async () => {
    delete S.notes[`${app}::${ver}`];
    await api('DELETE', `/api/apps/${app}/versions/${ver}`);
    toast(`版本 ${ver} 已删除`); closeModal('modal-confirm');
    await loadApps(); await renderApp(app);
  };
  $('confirm-ok').onclick = () => S.pendingConfirm().catch(e=>toast(e.message,'error'));
  openModal('modal-confirm');
}
function confirmDeleteApp(app) {
  $('confirm-title').textContent = `删除资源库 ${app}`;
  $('confirm-msg').textContent = `将删除资源库 ${app} 及全部版本文件，不可恢复。`;
  S.pendingConfirm = async () => {
    Object.keys(S.notes).forEach(k=>{ if(k.startsWith(app+'::')) delete S.notes[k]; });
    await api('DELETE', `/api/apps/${app}`);
    S.currentApp = null; toast(`资源库 ${app} 已删除`); closeModal('modal-confirm');
    await loadApps();
    $('content').innerHTML = '<div class="empty-state"><div class="empty-icon">◈</div><div class="empty-text">从左侧选择资源库</div></div>';
  };
  $('confirm-ok').onclick = () => S.pendingConfirm().catch(e=>toast(e.message,'error'));
  openModal('modal-confirm');
}

// ── NEW VERSION ──────────────────────────────────────
function showNewVerModal() { $('new-ver-num').value=''; $('ver-err').style.display='none'; openModal('modal-new-ver'); }
async function createVersion() {
  let ver = $('new-ver-num').value.trim();
  if (!ver) return;
  if (!ver.startsWith('v')) ver = 'v' + ver;
  if (!isValidVer(ver)) { $('ver-err').textContent='格式不正确，请使用 v1.0.0 格式'; $('ver-err').style.display='block'; return; }
  try {
    closeModal('modal-new-ver');
    const fd = new FormData(); fd.append('files', new File([''], '.gitkeep'));
    await api('POST', `/api/apps/${S.currentApp}/versions/${ver}/upload`, fd, true);
    toast(`版本 ${ver} 已创建`);
    await renderApp(S.currentApp); await loadApps();
  } catch(e) { toast(e.message,'error'); }
}

// ── NEW APP ──────────────────────────────────────────
function showNewAppModal() { $('new-app-name').value=''; selectRepoType('general'); openModal('modal-new-app'); }
async function createApp() {
  const name = $('new-app-name').value.trim();
  const repoType = $('new-repo-type').value||'general';
  if (!name) return;
  try {
    await api('POST', '/api/apps', {name, repoType});
    closeModal('modal-new-app'); toast(`资源库 ${name} 已创建`);
    await loadApps(); selectApp(name, repoType);
  } catch(e) { toast(e.message,'error'); }
}

// ── SETTINGS ─────────────────────────────────────────
async function showSettings() {
  openModal('modal-settings');
  try { const s = await api('GET','/api/settings'); $('base-url-input').value = s.baseUrl||''; } catch {}
}
async function saveBaseUrl() {
  const u = $('base-url-input').value.trim();
  if (!u) { toast('请输入 BASE_URL','error'); return; }
  try { await api('POST','/api/base-url',{baseUrl:u}); toast('BASE_URL 已保存'); if(S.currentApp) await renderApp(S.currentApp); }
  catch(e) { toast(e.message,'error'); }
}
async function changePassword() {
  const o=$('old-pwd').value, p1=$('new-pwd').value, p2=$('new-pwd2').value;
  if (!o) { toast('请输入当前密码','error'); return; }
  if (p1!==p2) { toast('两次新密码不一致','error'); return; }
  if (p1.length<8) { toast('新密码至少8位','error'); return; }
  try {
    await api('POST','/api/change-password',{oldPassword:o,newPassword:p1});
    toast('密码已更新'); $('old-pwd').value=$('new-pwd').value=$('new-pwd2').value='';
    closeModal('modal-settings');
  } catch(e) { toast(e.message,'error'); }
}

document.addEventListener('keydown', e => { if (e.key==='Enter' && $('login-page').style.display!=='none') login(); });
</script>
</body>
